apiVersion: batch/v1
kind: CronJob
metadata:
  name: cm-record-bybit
  namespace: cm
  labels:
    app: cm-record
    exchange: bybit
spec:
  schedule: "55 * * * *"          # 5 min before the hour (for --hour-align overlap)
  concurrencyPolicy: Allow         # Previous job may still be uploading
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      activeDeadlineSeconds: 5400  # 90m — 70m recording + 20m upload buffer
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: cm-record
            exchange: bybit
        spec:
          restartPolicy: Never
          containers:
            - name: recorder
              image: "ghcr.io/nikitok/cm-hft/cm-record:f7ae38e3afed75d7c80e1235194ebd2964b5a30c@sha256:3f31ba63599dc9efb1c0b6046dcb5766f8255ea5215b1dcaa3f412c2b595cfcc"
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              envFrom:
                - configMapRef:
                    name: cm-record-bybit-config
                - secretRef:
                    name: cm-record-s3-credentials
              volumeMounts:
                - name: data
                  mountPath: /data
          terminationGracePeriodSeconds: 30
          volumes:
            - name: data
              emptyDir:
                sizeLimit: 1Gi
